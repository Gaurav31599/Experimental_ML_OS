<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ExperimentOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;overflow:hidden}
@keyframes pulse-node{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes flow-edge{to{stroke-dashoffset:-18}}
@keyframes fly-in{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes log-in{from{transform:translateX(-6px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes count-up{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
@keyframes badge-pop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes shimmer{0%,100%{opacity:0.4}50%{opacity:1}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
select{-webkit-appearance:none;appearance:none}
button{cursor:pointer;transition:opacity 0.15s,transform 0.1s}
button:hover{opacity:0.85}
button:active{transform:scale(0.97)}
input[type=text]:focus{outline:none;border-color:#58a6ff!important}
#root{height:100vh}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script type="text/babel" data-presets="react">

const MONO = "'JetBrains Mono',monospace";
const SANS = "'Space Grotesk',sans-serif";

class ExperimentOS extends React.Component {

  NODES = [
    {id:'start',             label:'START',             x:160,y:28, type:'terminal'},
    {id:'ingest',            label:'ingest',            x:160,y:80, type:'node'},
    {id:'detect_task_type',  label:'detect_task_type',  x:160,y:132,type:'node'},
    {id:'profile_data',      label:'profile_data',      x:160,y:184,type:'node'},
    {id:'build_preprocessor',label:'build_preprocessor',x:160,y:236,type:'node'},
    {id:'train_baseline',    label:'train_baseline',    x:160,y:288,type:'node'},
    {id:'rank',              label:'rank',              x:160,y:350,type:'node'},
    {id:'router',            label:'route',             x:160,y:404,type:'diamond'},
    {id:'apply_improvement', label:'apply_improvement', x:278,y:404,type:'node'},
    {id:'generate_report',   label:'generate_report',   x:160,y:464,type:'node'},
    {id:'end',               label:'END',               x:160,y:518,type:'terminal'},
  ];

  EDGES = [
    {id:'e01',path:'M 160 41 L 160 67'},
    {id:'e02',path:'M 160 94 L 160 119'},
    {id:'e03',path:'M 160 146 L 160 171'},
    {id:'e04',path:'M 160 198 L 160 223'},
    {id:'e05',path:'M 160 250 L 160 275'},
    {id:'e06',path:'M 160 302 L 160 337'},
    {id:'e07',path:'M 160 364 L 160 387'},
    {id:'e08',path:'M 179 404 L 201 404',label:'improve',lx:190,ly:396},
    {id:'e09',path:'M 160 421 L 160 451',label:'report', lx:168,ly:438},
    {id:'e10',path:'M 349 404 C 377 404 377 350 236 350',loopback:true},
    {id:'e11',path:'M 160 478 L 160 505'},
  ];

  FAKE_LB = [
    {model:'RandomForest',      round:0,stage:'baseline',             f1_weighted:0.847,accuracy:0.853,roc_auc:0.901},
    {model:'XGBoost',           round:0,stage:'baseline',             f1_weighted:0.839,accuracy:0.849,roc_auc:0.889},
    {model:'LogisticRegression',round:0,stage:'baseline',             f1_weighted:0.821,accuracy:0.821,roc_auc:0.874},
    {model:'RandomForest',      round:1,stage:'class_weight_balanced',f1_weighted:0.871,accuracy:0.874,roc_auc:0.913},
    {model:'XGBoost',           round:1,stage:'class_weight_balanced',f1_weighted:0.862,accuracy:0.867,roc_auc:0.906},
    {model:'LogisticRegression',round:1,stage:'class_weight_balanced',f1_weighted:0.834,accuracy:0.836,roc_auc:0.880},
    {model:'RandomForest',      round:2,stage:'robust_scaler',        f1_weighted:0.879,accuracy:0.881,roc_auc:0.918},
    {model:'XGBoost',           round:2,stage:'robust_scaler',        f1_weighted:0.868,accuracy:0.872,roc_auc:0.909},
    {model:'LogisticRegression',round:2,stage:'robust_scaler',        f1_weighted:0.839,accuracy:0.841,roc_auc:0.882},
  ];

  _prevLiveNode = null;
  _es = null;

  state = {
    backendUrl:'https://experimental-ml-os.onrender.com',
    isLive:false,
    backendChecked:false,
    status:'idle',
    fileName:null,
    fileInfo:'',
    columns:[],
    targetColumn:'',
    runId:null,
    nodeStates:{},
    edgeStates:{},
    nodeVisits:{},
    currentNode:null,
    diagnostics:null,
    leaderboard:[],
    lbTaskType:'classification',
    lbPrimaryMetric:'f1_weighted',
    improvementLog:[],
    reportMarkdown:null,
    log:[],
    experimentId:'',
    runCount:0,
    showDiag:false,
    showLB:false,
    showChart:false,
    showImprove:false,
  };

  componentDidMount() {
    const saved = localStorage.getItem('experimentos_backend_url') || 'https://experimental-ml-os.onrender.com';
    this.setState({backendUrl:saved}, () => this._checkHealth());
  }

  componentWillUnmount() {
    if (this._es) {this._es.close(); this._es = null;}
  }

  _sN = (id, st) => this.setState(s => ({
    nodeStates:  {...s.nodeStates,  [id]:st},
    currentNode: st==='running' ? id : (s.currentNode===id ? null : s.currentNode),
    nodeVisits:  st==='complete' ? {...s.nodeVisits,[id]:(s.nodeVisits[id]||0)+1} : s.nodeVisits,
  }));

  _sE = (id, st) => this.setState(s => ({edgeStates:{...s.edgeStates,[id]:st}}));

  L = (text, type='info') => {
    const now = new Date();
    const t = `${String(now.getSeconds()).padStart(2,'0')}.${String(Math.floor(now.getMilliseconds()/10)).padStart(2,'0')}`;
    const color = {warn:'#e3b341',success:'#3fb950',sys:'#bc8cff',dim:'#3d444d',error:'#f78166'}[type]||'#6e7681';
    this.setState(s => ({log:[...s.log.slice(-150),{id:Math.random(),t,text,color}]}));
    setTimeout(() => {const el=document.getElementById('logpane');if(el)el.scrollTop=el.scrollHeight;},40);
  };

  _checkHealth = async () => {
    try {
      const ctl = new AbortController();
      setTimeout(() => ctl.abort(), 2500);
      const res = await fetch(this.state.backendUrl+'/health',{signal:ctl.signal});
      this.setState({isLive:res.ok,backendChecked:true});
    } catch {
      this.setState({isLive:false,backendChecked:true});
    }
  };

  handleBackendUrlChange = (e) => {
    const url = e.target.value.replace(/\/$/,'');
    this.setState({backendUrl:url}, () => {
      localStorage.setItem('experimentos_backend_url',url);
      this._checkHealth();
    });
  };

  handleFileChange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (this.state.isLive) {
      const fd = new FormData();
      fd.append('file',file);
      try {
        const res = await fetch(this.state.backendUrl+'/upload',{method:'POST',body:fd});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        this.setState({
          runId:data.run_id,
          fileName:data.filename||file.name,
          fileInfo:`${(data.rows||0).toLocaleString()} rows`,
          columns:data.columns,
          targetColumn:data.columns[data.columns.length-1],
        });
      } catch(err) {
        this.L('Upload failed: '+err.message,'error');
        this._parseColumnsLocally(file);
      }
    } else {
      this._parseColumnsLocally(file);
    }
  };

  _parseColumnsLocally = (file) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const lines = ev.target.result.trim().split('\n');
      const cols = lines[0].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      this.setState({fileName:file.name,fileInfo:`${(lines.length-1).toLocaleString()} rows`,columns:cols,targetColumn:cols[cols.length-1],runId:null});
    };
    reader.readAsText(file);
  };

  handleTargetChange = e => this.setState({targetColumn:e.target.value});

  handleRun = () => {
    if (this.state.isLive && this.state.runId) this._startLive();
    else this._start();
  };

  handleDemo = () => {
    this.setState({
      fileName:'churn_telecom.csv',fileInfo:'1,247 rows',runId:null,
      columns:['age','tenure','monthly_charges','total_charges','num_products','has_partner','contract_type','internet_service','payment_method','churn'],
      targetColumn:'churn',
    }, () => this._start());
  };

  handleReset = () => {
    if (this._es) {this._es.close(); this._es=null;}
    this.setState({
      status:'idle',fileName:null,fileInfo:'',columns:[],targetColumn:'',runId:null,
      nodeStates:{},edgeStates:{},nodeVisits:{},currentNode:null,
      diagnostics:null,leaderboard:[],improvementLog:[],log:[],
      showDiag:false,showLB:false,showChart:false,showImprove:false,
      reportMarkdown:null,runCount:0,
    });
  };

  handleDownloadReport = () => {
    const {backendUrl,runId,reportMarkdown} = this.state;
    if (backendUrl && runId) {
      window.open(`${backendUrl}/report/${runId}`,'_blank');
    } else if (reportMarkdown) {
      const blob = new Blob([reportMarkdown],{type:'text/markdown'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href=url; a.download='report.md'; a.click();
      URL.revokeObjectURL(url);
    }
  };

  _startLive = () => {
    const {backendUrl,runId,targetColumn} = this.state;
    this._prevLiveNode = null;
    const expId = 'exp_'+Date.now().toString(36).slice(-6);
    this.setState({
      status:'running',experimentId:expId,
      nodeStates:{},edgeStates:{},nodeVisits:{},currentNode:null,
      leaderboard:[],improvementLog:[],log:[],runCount:0,
      diagnostics:null,showDiag:false,showLB:false,showChart:false,showImprove:false,
      reportMarkdown:null,
    });
    const url = `${backendUrl}/run/${runId}?target=${encodeURIComponent(targetColumn)}`;
    const es = new EventSource(url);
    this._es = es;
    es.addEventListener('node_start', e => {
      const {node} = JSON.parse(e.data);
      const from = this._prevLiveNode;
      this._prevLiveNode = node;
      this._animateEdge(from,node);
      setTimeout(() => this._sN(node,'running'),200);
    });
    es.addEventListener('node_complete', e => {
      const {node} = JSON.parse(e.data);
      this._sN(node,'complete');
    });
    es.addEventListener('log', e => {
      const {text,type} = JSON.parse(e.data);
      this.L(text,type||'info');
    });
    es.addEventListener('diagnostics', e => {
      const d = JSON.parse(e.data);
      const ratio = d.imbalance_ratio;
      this.setState({
        diagnostics:{
          taskType:d.task_type,rows:d.rows,
          numericCols:(d.numeric_cols||[]).length,
          catCols:(d.categorical_cols||[]).length,
          imbalance:!!d.imbalance_detected,
          ratio:ratio?parseFloat(ratio).toFixed(1):'—',
          majPct:d.maj_pct||50,
          skew:!!d.skew_detected,
          skewCols:d.skewed_cols||[],
        },
        showDiag:true,
      });
    });
    es.addEventListener('leaderboard', e => {
      const data = JSON.parse(e.data);
      this.setState({
        leaderboard:data.rows||[],
        lbTaskType:data.task_type||'classification',
        lbPrimaryMetric:data.primary_metric||'f1_weighted',
        runCount:(data.rows||[]).length,
        showLB:true,
        showChart:(data.rows||[]).length>=3,
      });
    });
    es.addEventListener('improvement', e => {
      const imp = JSON.parse(e.data);
      this.setState(s => ({improvementLog:[...s.improvementLog,imp],showImprove:true}));
    });
    es.addEventListener('report', e => {
      const {markdown} = JSON.parse(e.data);
      this.setState({reportMarkdown:markdown});
    });
    es.addEventListener('done', e => {
      const data = JSON.parse(e.data);
      this.L(`✓ pipeline complete · ${data.elapsed}s elapsed`,'success');
      this.setState({status:'complete',currentNode:null,experimentId:data.experiment_id||this.state.experimentId});
      es.close(); this._es=null;
    });
    es.addEventListener('error', e => {
      if (e.data) {try{const d=JSON.parse(e.data);this.L('Error: '+d.message,'error');}catch{}}
      this.setState(s => s.status==='running'?{status:'error'}:{});
      es.close(); this._es=null;
    });
    es.onerror = () => {
      if (this.state.status==='running') {
        this.L('SSE connection lost','error');
        this.setState({status:'error'});
      }
      es.close();
    };
  };

  _animateEdge = async (from, to) => {
    const sleep = ms => new Promise(r => setTimeout(r,ms));
    if (!from) return;
    if (from==='rank' && (to==='apply_improvement'||to==='generate_report')) {
      this._sE('e07','active'); await sleep(100);
      this._sN('router','running'); await sleep(120);
      this._sN('router','complete'); this._sE('e07','complete');
      const eId = to==='apply_improvement'?'e08':'e09';
      const eSt = to==='apply_improvement'?'complete-improve':'complete-report';
      this._sE(eId,'active'); await sleep(130); this._sE(eId,eSt);
      return;
    }
    const edgeMap = {
      ingest:'e01',detect_task_type:'e02',profile_data:'e03',
      build_preprocessor:'e04',train_baseline:'e05',
      rank:from==='apply_improvement'?'e10':'e06',
      generate_report:'e09',apply_improvement:'e08',end:'e11',
    };
    const edgeId = edgeMap[to];
    if (edgeId) {this._sE(edgeId,'active'); await sleep(160); this._sE(edgeId,'complete');}
  };

  _start = () => {
    const id = 'exp_'+Date.now().toString(36).slice(-6);
    this.setState({
      status:'running',experimentId:id,
      nodeStates:{},edgeStates:{},nodeVisits:{},currentNode:null,
      leaderboard:[],improvementLog:[],log:[],runCount:0,
      diagnostics:null,showDiag:false,showLB:false,showChart:false,showImprove:false,
      reportMarkdown:null,
    }, () => this._runSimulation());
  };

  _runSimulation = async () => {
    const sleep = ms => new Promise(r => setTimeout(r,ms));
    const sN=this._sN, sE=this._sE, L=this.L;

    sN('start','complete');
    L('pipeline started  ·  '+this.state.experimentId,'sys');
    await sleep(200);

    sE('e01','active'); await sleep(150); sE('e01','complete'); sN('ingest','running');
    L('→ ingest: loading '+this.state.fileName);
    await sleep(200); L('  ↳ 1,247 rows × 14 cols  ·  3 null targets dropped','dim');
    await sleep(340); sN('ingest','complete');

    sE('e02','active'); await sleep(150); sE('e02','complete'); sN('detect_task_type','running');
    L('→ detect_task_type: scanning target "'+this.state.targetColumn+'"');
    await sleep(170); L('  ↳ 2 unique values  →  classification','dim');
    await sleep(250); sN('detect_task_type','complete');

    sE('e03','active'); await sleep(150); sE('e03','complete'); sN('profile_data','running');
    L('→ profile_data: analyzing 13 feature columns…');
    await sleep(190); L('  ↳ 10 numeric cols, 3 categorical cols','dim');
    await sleep(150); L('  ↳ class imbalance 3.2:1 detected','warn');
    await sleep(140); L('  ↳ skew detected: monthly_charges=2.31, total_charges=1.84','warn');
    await sleep(240); sN('profile_data','complete');
    this.setState({
      diagnostics:{taskType:'classification',rows:1247,numericCols:10,catCols:3,imbalance:true,ratio:'3.2',majPct:76,skew:true,skewCols:['monthly_charges','total_charges']},
      showDiag:true,
    });

    sE('e04','active'); await sleep(150); sE('e04','complete'); sN('build_preprocessor','running');
    L('→ build_preprocessor: StandardScaler + OneHotEncoder');
    await sleep(270); sN('build_preprocessor','complete');

    sE('e05','active'); await sleep(150); sE('e05','complete'); sN('train_baseline','running');
    L('→ train_baseline: round 0 · 3 candidate models');
    await sleep(310); L('  ↳ LogisticRegression      f1_weighted=0.821  run=a1b2c3d4','dim');
    await sleep(780); L('  ↳ RandomForest            f1_weighted=0.847  run=e5f6a7b8','dim');
    await sleep(660); L('  ↳ XGBoost                 f1_weighted=0.839  run=c9d0e1f2','dim');
    await sleep(280); L('  ↳ 3 runs logged to MLflow  ·  '+this.state.experimentId,'sys');
    sN('train_baseline','complete');

    sE('e06','active'); await sleep(150); sE('e06','complete'); sN('rank','running');
    L('→ rank: best f1_weighted=0.847 (RandomForest r0)');
    await sleep(290); sN('rank','complete');
    this.setState({leaderboard:this.FAKE_LB.slice(0,3),lbTaskType:'classification',lbPrimaryMetric:'f1_weighted',showLB:true,runCount:3});

    sE('e07','active'); await sleep(130); sN('router','running'); sE('e07','complete');
    L('→ route: imbalance_detected=true, round=0  →  improve');
    await sleep(230); sN('router','complete');
    sE('e08','active'); await sleep(130); sE('e08','complete-improve');

    sN('apply_improvement','running');
    L('→ apply_improvement: round 1 · class_weight=balanced');
    await sleep(290); L('  ↳ LogisticRegression      f1_weighted=0.834  run=g3h4i5j6','dim');
    await sleep(730); L('  ↳ RandomForest            f1_weighted=0.871  run=k7l8m9n0','dim');
    await sleep(640); L('  ↳ XGBoost                 f1_weighted=0.862  run=o1p2q3r4','dim');
    await sleep(270); sN('apply_improvement','complete');

    sE('e10','active'); await sleep(160); sE('e10','complete'); sN('rank','running');
    L('→ rank: best f1_weighted=0.871 (RandomForest r1)');
    await sleep(290); sN('rank','complete');
    this.setState(s => ({
      leaderboard:this.FAKE_LB.slice(0,6),showChart:true,runCount:6,
      improvementLog:[...s.improvementLog,{
        round:1,fix:'class_weight=balanced',
        note:'Detected class imbalance (3.2:1). Retrained all candidates with class_weight="balanced"; XGBoost received balanced sample weights.',
        before:0.847,after:0.871,
      }],
      showImprove:true,
    }));

    sE('e07','active'); await sleep(130); sN('router','running'); sE('e07','complete');
    L('→ route: skew_detected=true, round=1  →  improve');
    await sleep(220); sN('router','complete');
    sE('e08','active'); await sleep(130); sE('e08','complete-improve');

    sN('apply_improvement','running');
    L('→ apply_improvement: round 2 · RobustScaler');
    await sleep(270); L('  ↳ LogisticRegression      f1_weighted=0.839  run=s5t6u7v8','dim');
    await sleep(700); L('  ↳ RandomForest            f1_weighted=0.879  run=w9x0y1z2','dim');
    await sleep(610); L('  ↳ XGBoost                 f1_weighted=0.868  run=a3b4c5d6','dim');
    await sleep(260); sN('apply_improvement','complete');

    sE('e10','active'); await sleep(160); sE('e10','complete'); sN('rank','running');
    L('→ rank: best f1_weighted=0.879 (RandomForest r2)');
    await sleep(280); sN('rank','complete');
    this.setState(s => ({
      leaderboard:this.FAKE_LB,runCount:9,
      improvementLog:[...s.improvementLog,{
        round:2,fix:'RobustScaler',
        note:'Detected numeric skew in monthly_charges (2.31) and total_charges (1.84). Rebuilt the preprocessor with RobustScaler and retrained all candidates.',
        before:0.871,after:0.879,
      }],
    }));

    sE('e07','active'); await sleep(130); sN('router','running'); sE('e07','complete');
    L('→ route: round_count=2, max rounds reached  →  report');
    await sleep(220); sN('router','complete');
    sE('e09','active'); await sleep(130); sE('e09','complete-report');

    sN('generate_report','running');
    L('→ generate_report: compiling markdown report…');
    await sleep(400); L('  ↳ report ready','success');
    await sleep(290); sN('generate_report','complete');

    sE('e11','active'); await sleep(160); sE('e11','complete'); sN('end','complete');
    L('✓ pipeline complete  ·  9 MLflow runs  ·  8.3s elapsed','success');
    this.setState({status:'complete',currentNode:null,reportMarkdown:'# ExperimentOS Report\n\n*Demo run — connect the backend to generate a real report.*'});
  };

  _renderGraph() {
    const {nodeStates,edgeStates,nodeVisits} = this.state;
    const C = {
      idle:'#2d333b',run:'#58a6ff',done:'#3fb950',imp:'#e3b341',rep:'#bc8cff',
      bg_run:'rgba(88,166,255,0.08)',bg_done:'rgba(63,185,80,0.05)',
      t_idle:'#3d444d',t_run:'#58a6ff',t_done:'#3fb950',
    };
    const nc = id => {
      const st = nodeStates[id]||'idle';
      if (st==='running')  return {s:C.run, f:C.bg_run, t:C.t_run};
      if (st==='complete') return {s:C.done,f:C.bg_done,t:C.t_done};
      return {s:C.idle,f:'rgba(255,255,255,0.012)',t:C.t_idle};
    };
    const ec = id => {
      const st = edgeStates[id]||'idle';
      if (st==='active')           return {s:C.run, dash:'8 4',anim:true, mk:'run'};
      if (st==='complete-improve') return {s:C.imp, dash:null, anim:false,mk:'imp'};
      if (st==='complete-report')  return {s:C.rep, dash:null, anim:false,mk:'rep'};
      if (st==='complete')         return {s:C.done,dash:null, anim:false,mk:'don'};
      return {s:C.idle,dash:'3 4',anim:false,mk:'idl'};
    };
    const h = React.createElement;
    const els = [];
    const mkDefs = [['idl',C.idle],['run',C.run],['don',C.done],['imp',C.imp],['rep',C.rep]].map(
      ([n,c]) => h('marker',{key:n,id:`mk-${n}`,viewBox:'0 0 10 10',refX:5,refY:5,markerWidth:5,markerHeight:5,orient:'auto'},
        h('path',{d:'M 0 0 L 10 5 L 0 10 z',fill:c}))
    );
    els.push(h('defs',{key:'defs'},mkDefs));
    this.EDGES.forEach(edge => {
      const e = ec(edge.id);
      els.push(h('path',{key:edge.id,d:edge.path,stroke:e.s,strokeWidth:1.5,fill:'none',
        strokeDasharray:e.anim?'8 4':(e.dash||undefined),
        markerEnd:`url(#mk-${e.mk})`,
        style:e.anim?{animation:'flow-edge 0.4s linear infinite'}:{},
      }));
      if (edge.label) {
        const lc = (edgeStates[edge.id]||'idle')==='idle'?C.idle:(edge.id==='e08'?C.imp:C.rep);
        els.push(h('text',{key:`el-${edge.id}`,x:edge.lx,y:edge.ly,fill:lc,fontSize:7.5,fontFamily:MONO,textAnchor:'middle'},edge.label));
      }
    });
    const rv = nodeVisits['rank']||0;
    if (rv>0) els.push(h('text',{key:'loop-rv',x:382,y:378,fill:C.imp,fontSize:8.5,fontFamily:MONO,textAnchor:'middle',style:{animation:'badge-pop 0.3s ease'}},`×${rv}`));
    this.NODES.forEach(node => {
      const c = nc(node.id);
      const running = (nodeStates[node.id]||'idle')==='running';
      const sty = running?{animation:'pulse-node 0.85s ease-in-out infinite'}:{};
      if (node.type==='terminal') {
        els.push(h('circle',{key:node.id,cx:node.x,cy:node.y,r:13,stroke:c.s,strokeWidth:1.5,fill:c.f,style:sty}));
        els.push(h('text',{key:`t-${node.id}`,x:node.x,y:node.y+4,textAnchor:'middle',fill:c.t,fontSize:8,fontWeight:700,fontFamily:SANS},node.label));
      } else if (node.type==='diamond') {
        const hw=19,hh=17;
        els.push(h('path',{key:node.id,d:`M${node.x} ${node.y-hh} L${node.x+hw} ${node.y} L${node.x} ${node.y+hh} L${node.x-hw} ${node.y}Z`,stroke:c.s,strokeWidth:1.5,fill:c.f,style:sty}));
        els.push(h('text',{key:`t-${node.id}`,x:node.x,y:node.y+4,textAnchor:'middle',fill:c.t,fontSize:8,fontFamily:MONO},node.label));
      } else {
        const w = node.id==='apply_improvement'?140:152;
        els.push(h('rect',{key:node.id,x:node.x-w/2,y:node.y-13,width:w,height:26,rx:4,stroke:c.s,strokeWidth:1.5,fill:c.f,style:sty}));
        els.push(h('text',{key:`t-${node.id}`,x:node.x,y:node.y+4.5,textAnchor:'middle',fill:c.t,fontSize:9.5,fontFamily:MONO},node.label));
      }
      const visits = nodeVisits[node.id]||0;
      if (visits>0 && (node.id==='rank'||node.id==='apply_improvement')) {
        const bx = node.id==='apply_improvement'?node.x+63:node.x+71;
        els.push(h('text',{key:`vb-${node.id}`,x:bx,y:node.y-9,fill:C.imp,fontSize:7.5,fontFamily:MONO,style:{animation:'badge-pop 0.3s ease'}},`×${visits}`));
      }
    });
    return h('svg',{viewBox:'0 0 400 540',style:{width:'100%',maxWidth:'320px',display:'block',margin:'0 auto'}},els);
  }

  _renderChart() {
    const lb = this.state.leaderboard;
    if (!lb.length) return null;
    const isReg = this.state.lbTaskType==='regression';
    const primary = this.state.lbPrimaryMetric||(isReg?'rmse':'f1_weighted');
    const W=580,H=180,PL=46,PR=14,PT=16,PB=34;
    const cW=W-PL-PR, cH=H-PT-PB;
    const stageC = {baseline:'#58a6ff',class_weight_balanced:'#e3b341',robust_scaler:'#3fb950'};
    const stages = ['baseline','class_weight_balanced','robust_scaler'];
    const modelSet=[], seen=new Set();
    lb.forEach(r => {const m=r.model||r.model_name; if(m&&!seen.has(m)){seen.add(m);modelSet.push(m);}});
    const vals = lb.map(r=>parseFloat(r[primary])||0).filter(v=>!isNaN(v));
    if (!vals.length) return null;
    const minV=Math.max(0,Math.min(...vals)*0.98), maxV=Math.max(...vals)*1.012;
    const sy = v => cH-(v-minV)/(maxV-minV)*cH;
    const bW=18,gap=4;
    const h = React.createElement;
    const els=[];
    for (let i=0;i<=4;i++) {
      const v=minV+(maxV-minV)*i/4, y=PT+sy(v);
      els.push(h('line',{key:`gl-${i}`,x1:PL,y1:y,x2:W-PR,y2:y,stroke:'#21262d',strokeWidth:1,strokeDasharray:'3 3'}));
      els.push(h('text',{key:`gt-${i}`,x:PL-5,y:y+3.5,textAnchor:'end',fill:'#484f58',fontSize:8.5,fontFamily:MONO},v.toFixed(3)));
    }
    modelSet.forEach((model,gi) => {
      const gx=PL+gi*(cW/modelSet.length)+(cW/modelSet.length)/2;
      const totalBW=stages.length*bW+(stages.length-1)*gap;
      stages.forEach((st,si) => {
        const row=lb.find(r=>(r.model||r.model_name)===model&&r.stage===st);
        if (!row) return;
        const val=parseFloat(row[primary]);
        if (isNaN(val)) return;
        const bx=gx-totalBW/2+si*(bW+gap);
        const bH2=Math.max(1,cH-sy(val)), by=PT+sy(val);
        els.push(h('rect',{key:`b-${model}-${st}`,x:bx,y:by,width:bW,height:bH2,fill:stageC[st]||'#58a6ff',opacity:0.85,rx:2}));
        els.push(h('text',{key:`v-${model}-${st}`,x:bx+bW/2,y:by-3,textAnchor:'middle',fill:stageC[st]||'#58a6ff',fontSize:7,fontFamily:MONO,fontWeight:500},val.toFixed(3)));
      });
      const shortM=model.replace('LogisticRegression','LR').replace('RandomForest','RF').replace('GradientBoosting','GB');
      els.push(h('text',{key:`ml-${model}`,x:gx,y:H-PB+14,textAnchor:'middle',fill:'#8b949e',fontSize:10,fontFamily:MONO},shortM));
    });
    els.push(h('line',{key:'ya',x1:PL,y1:PT,x2:PL,y2:H-PB,stroke:'#30363d',strokeWidth:1}));
    return h('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:'100%',display:'block'}},els);
  }

                    </div>

                    <div style={{background:'#161b22',border:`1px solid ${iB}`,borderRadius:'10px',padding:'16px 15px'}}>
                      <div style={{fontSize:'8.5px',textTransform:'uppercase',letterSpacing:'0.8px',color:'#484f58',marginBottom:'9px',fontFamily:MONO}}>Class Balance</div>
                      <div style={{fontSize:'21px',fontWeight:700,color:iC,marginBottom:'3px',animation:'count-up 0.4s ease'}}>{iL}</div>
                      <div style={{fontSize:'10px',color:'#484f58',fontFamily:MONO,lineHeight:'1.5'}}>{iS}</div>
                      <div style={{marginTop:'9px',height:'3px',background:'#21262d',borderRadius:'2px',overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${d.majPct||50}%`,background:iC,borderRadius:'2px',transition:'width 0.7s ease'}}></div>
                      </div>
                    </div>

                    <div style={{background:'#161b22',border:`1px solid ${sB}`,borderRadius:'10px',padding:'16px 15px'}}>
                      <div style={{fontSize:'8.5px',textTransform:'uppercase',letterSpacing:'0.8px',color:'#484f58',marginBottom:'9px',fontFamily:MONO}}>Numeric Skew</div>
                      <div style={{fontSize:'21px',fontWeight:700,color:sC,marginBottom:'3px',animation:'count-up 0.4s ease'}}>{skL}</div>
                      <div style={{fontSize:'10px',color:'#484f58',fontFamily:MONO,lineHeight:'1.5'}}>{skD}</div>
                    </div>

                  </div>
                </div>
              )}

              {/* 02 · Leaderboard */}
              {s.showLB && (
                <div style={{marginBottom:'30px',animation:'fly-in 0.45s ease'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'13px'}}>
                    <div style={{fontSize:'8.5px',textTransform:'uppercase',letterSpacing:'1.3px',color:'#484f58',fontFamily:MONO}}>02 · Model Leaderboard</div>
                    <div style={{flex:1,height:'1px',background:'#21262d'}}></div>
                    <div style={{fontSize:'8.5px',color:'#484f58',fontFamily:MONO}}>{lbSort}</div>
                  </div>
                  <div style={{background:'#161b22',border:'1px solid #21262d',borderRadius:'10px',overflow:'hidden'}}>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 38px 120px 72px 72px 72px',padding:'8px 16px',borderBottom:'1px solid #21262d',fontSize:'8.5px',textTransform:'uppercase',letterSpacing:'0.8px',color:'#484f58',fontFamily:MONO}}>
                      <div>Model</div><div>Rnd</div><div>Stage</div><div>{lbH1}</div><div>{lbH2}</div><div>{lbH3}</div>
                    </div>
                    {lbRows.map((row,i) => (
                      <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 38px 120px 72px 72px 72px',padding:'10px 16px',borderBottom:'1px solid #0d1117',fontSize:'12px',animation:'fly-in 0.3s ease',background:row.bg,alignItems:'center'}}>
                        <div style={{display:'flex',alignItems:'center',gap:'6px',fontFamily:MONO,fontWeight:500,color:'#c9d1d9',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          {row.isBest && <span style={{color:'#e3b341',fontSize:'10px',flexShrink:0}}>★</span>}
                          {row.model}
                        </div>
                        <div style={{color:'#484f58',fontFamily:MONO,fontSize:'10.5px'}}>r{row.round}</div>
                        <div><span style={{background:row.ssBg,color:row.ssC,fontSize:'8.5px',padding:'2px 7px',borderRadius:'9px',fontFamily:MONO,whiteSpace:'nowrap'}}>{row.sl}</span></div>
                        <div style={{fontFamily:MONO,fontWeight:600,color:row.f1c,fontSize:'12.5px'}}>{row.f1s}</div>
                        <div style={{fontFamily:MONO,color:'#484f58',fontSize:'10.5px'}}>{row.accs}</div>
                        <div style={{fontFamily:MONO,color:'#484f58',fontSize:'10.5px'}}>{row.aucs}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* 03 · Metric Chart */}
              {s.showChart && (
                <div style={{marginBottom:'30px',animation:'fly-in 0.45s ease'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'13px'}}>
                    <div style={{fontSize:'8.5px',textTransform:'uppercase',letterSpacing:'1.3px',color:'#484f58',fontFamily:MONO}}>03 · {lbH1} by Model &amp; Stage</div>
                    <div style={{flex:1,height:'1px',background:'#21262d'}}></div>
                  </div>
                  <div style={{background:'#161b22',border:'1px solid #21262d',borderRadius:'10px',padding:'18px 18px 10px'}}>
                    {this._renderChart()}
                    <div style={{display:'flex',gap:'16px',marginTop:'10px',justifyContent:'center'}}>
                      {[['#58a6ff','baseline'],['#e3b341','balanced'],['#3fb950','robust']].map(([c,l])=>(
                        <div key={l} style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'9.5px',color:'#484f58',fontFamily:MONO}}>
                          <div style={{width:'9px',height:'9px',background:c,borderRadius:'2px',flexShrink:0}}></div>{l}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* 04 · Improvement Rounds */}
              {s.showImprove && (
                <div style={{marginBottom:'30px',animation:'fly-in 0.45s ease'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'13px'}}>
                    <div style={{fontSize:'8.5px',textTransform:'uppercase',letterSpacing:'1.3px',color:'#484f58',fontFamily:MONO}}>04 · Improvement Rounds</div>
                    <div style={{flex:1,height:'1px',background:'#21262d'}}></div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'9px'}}>
                    {impCards.map((card,i) => (
                      <div key={i} style={{background:'#161b22',border:`1px solid ${card.bc}`,borderRadius:'10px',padding:'15px 18px',animation:'fly-in 0.4s ease',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'14px'}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:'11px',fontWeight:600,color:card.tc,marginBottom:'5px',fontFamily:MONO}}>Round {card.round}  ·  {card.fix}</div>
                          <div style={{fontSize:'11.5px',color:'#6e7681',lineHeight:'1.65'}}>{card.note}</div>
                          <div style={{marginTop:'9px',display:'flex',alignItems:'center',gap:'14px',fontSize:'9.5px',fontFamily:MONO,color:'#484f58',flexWrap:'wrap'}}>
                            <span>before: <span style={{color:'#6e7681'}}>{card.bs}</span></span>
                            <span style={{color:card.tc}}>→</span>
                            <span>after: <span style={{color:'#c9d1d9',fontWeight:600}}>{card.as}</span></span>
                          </div>
                        </div>
                        <div style={{textAlign:'right',flexShrink:0}}>
                          <div style={{fontSize:'21px',fontWeight:700,color:'#3fb950',fontFamily:MONO,animation:'count-up 0.5s ease'}}>{card.delta}</div>
                          <div style={{fontSize:'8.5px',color:'#484f58',fontFamily:MONO,marginTop:'2px'}}>Δ {lbH1}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

            </div>
          )}

        </div>{/* /right */}

      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ExperimentOS));

</script>
</body>
</html>
